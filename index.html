<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laser Plus - Puntos de Lealtad</title>
    <style>
        :root {
            --bg-color: #06090e;
            --card-bg: linear-gradient(135deg, #141923 0%, #0d1117 100%);
            --text-main: #ffffff;
            --text-dim: #6e7681;
            
            /* Colores de tu marca */
            --logo-yellow: #e2e600;
            --logo-pink: #e51a75;
            --logo-blue: #00bfff;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .screen-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            padding: 24px 20px 100px 20px;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        /* === LOGOTIPO MINIMALISTA EN BLANCO PURE === */
        .brand-container {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 35px;
        }
        .brand-logo {
            font-size: 2.4rem;
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -0.5px;
            color: #ffffff;
            display: inline-block;
            text-transform: lowercase;
        }
        .brand-logo .laser {
            display: block;
        }
        .brand-logo .plus {
            display: block;
            margin-top: 2px;
        }

        .header-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 4px;
        }
        .header-meta .title-left {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .header-meta .title-left span {
            color: var(--logo-blue);
        }
        .header-meta .title-right {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* === TARJETA PREMIUM === */
        .loyalty-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 28px 24px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.03);
            border: 1px solid #1f2631;
            margin-bottom: 20px;
        }
        .loyalty-card::after {
            content: '';
            position: absolute;
            bottom: 10%;
            right: 5%;
            width: 130px;
            height: 130px;
            background: radial-gradient(circle, rgba(0, 191, 255, 0.08) 0%, transparent 75%);
            pointer-events: none;
        }
        .greeting {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--logo-blue);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            font-weight: 600;
            margin-bottom: 12px;
        }
        .points-display {
            display: flex;
            align-items: baseline;
            margin-bottom: 10px;
        }
        .points-value {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
            color: var(--text-main);
        }
        .points-label {
            font-size: 1.6rem;
            color: var(--logo-blue);
            margin-left: 12px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .spend-value {
            font-size: 0.95rem;
            color: #c9d1d9;
            margin-bottom: 25px;
        }

        /* === BARRA DE PROGRESO CON GRADIENTE CORPORATIVO === */
        .progress-container {
            background-color: #161d27;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        /* Gradiente continuo que pasa por los colores del logotipo */
        .progress-fill {
            background: linear-gradient(90deg, var(--logo-blue) 0%, var(--logo-pink) 50%, var(--logo-yellow) 100%);
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: width 1s ease-in-out;
        }

        .card-inner-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            min-height: 20px;
        }
        .odoo-status {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        
        /* Cuadritos estáticos decorativos abajo a la derecha */
        .color-dots {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 14px;
            height: 7px;
            border-radius: 1px;
        }
        .dot.yellow { background-color: var(--logo-yellow); }
        .dot.pink { background-color: var(--logo-pink); }
        .dot.blue { background-color: var(--logo-blue); }

        .motivation-text {
            font-size: 0.9rem;
            color: var(--text-dim);
            text-align: center;
            margin-top: 15px;
        }
        
        .btn-redeem {
            display: none;
            position: absolute;
            bottom: 24px;
            left: 20px;
            right: 20px;
            background: linear-gradient(90deg, var(--logo-blue), #0088cc);
            color: #06090e;
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,191,255,0.3);
            transition: transform 0.1s ease;
            text-align: center;
        }
        .btn-redeem:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="screen-container">
    <div class="brand-container">
        <div class="brand-logo">
            <div class="laser">laser</div>
            <div class="plus">plus</div>
        </div>
    </div>

    <div class="header-meta">
        <div class="title-left">LASER <span>PLUS</span></div>
        <div class="title-right">Puntos de Lealtad</div>
    </div>

    <div class="loyalty-card">
        <div id="greeting" class="greeting">HOLA, CLIENTE</div>
        <div class="section-title">Mis Puntos</div>
        
        <div class="points-display">
            <div id="points-val" class="points-value">0</div>
            <div class="points-label">PTS</div>
        </div>

        <div id="spend-val" class="spend-value">Gasto: $0 MXN</div>
        
        <div class="progress-container">
            <div id="progress-fill" class="progress-fill"></div>
        </div>

        <div class="card-inner-footer">
            <div id="odoo-status" class="odoo-status">Conectando con Odoo...</div>
            <div class="color-dots">
                <div class="dot yellow"></div>
                <div class="dot pink"></div>
                <div class="dot blue"></div>
            </div>
        </div>
    </div>

    <div id="motivation" class="motivation-text"></div>
    
    <button id="btn-redeem" class="btn-redeem" onclick="handleRedeem()">Usar mis puntos</button>
</div>

<script>
const MIN_POINTS = 50;
const PERCENTAGE = 0.05; 
const MAX_POINTS = 1000; 

let currentIdCliente = null;
let puntosBrutosTotales = 0;

const workerUrl = "https://laser-plus-api.burnsvibb-1.workers.dev/";

async function init() {
    const params = new URLSearchParams(window.location.search);
    const name = params.get('nombre') || 'CLIENTE';
    let idCliente = params.get('id');

    document.getElementById('greeting').innerText = `HOLA, ${name.toUpperCase()}`;

    if (idCliente) {
        currentIdCliente = idCliente.replace(/\s+/g, '');

        try {
            const response = await fetch(`${workerUrl}?id=${currentIdCliente}`);
            const data = await response.json();

            if (data.gasto !== undefined) {
                const gastoReal = data.gasto;
                document.getElementById('odoo-status').innerText = ""; 
                
                puntosBrutosTotales = Math.floor(gastoReal * PERCENTAGE);
                if (puntosBrutosTotales > MAX_POINTS) {
                    puntosBrutosTotales = MAX_POINTS;
                }

                const puntosCanjeadosAnteriores = parseInt(localStorage.getItem(`canjeados_${currentIdCliente}`) || "0", 10);
                let puntosActuales = puntosBrutosTotales - puntosCanjeadosAnteriores;
                if (puntosActuales < 0) puntosActuales = 0;

                actualizarInterfaz(puntosActuales, gastoReal);
            } else {
                document.getElementById('odoo-status').innerText = "Cliente no encontrado.";
            }
        } catch (error) {
            console.error(error);
            document.getElementById('odoo-status').innerText = "Error al conectar con Odoo.";
        }
    } else {
        document.getElementById('odoo-status').innerText = "Falta ID de cliente.";
    }
}

function actualizarInterfaz(pts, spend) {
    document.getElementById('points-val').innerText = pts;
    document.getElementById('spend-val').innerText = `Gasto: $${spend.toLocaleString()} MXN`;
    
    // Rellenado fluido de la barra con base en la meta de 50 puntos
    const progress = Math.min((pts / MIN_POINTS) * 100, 100);
    document.getElementById('progress-fill').style.width = progress + '%';
    
    const motivation = document.getElementById('motivation');
    const btn = document.getElementById('btn-redeem');

    if (pts >= MIN_POINTS) {
        motivation.innerHTML = "";
        btn.style.display = 'block'; 
    } else {
        motivation.innerText = `Te faltan ${MIN_POINTS - pts} puntos para tu próximo premio.`;
        btn.style.display = 'none';
    }
}

function handleRedeem() {
    if (!currentIdCliente) return;

    const confirmar = confirm("¿Estás frente al mostrador de Laser Plus y deseas usar tus puntos?\n\nEsta acción reiniciará tu saldo actual en la pantalla.");
    
    if (confirmar) {
        localStorage.setItem(`canjeados_${currentIdCliente}`, puntosBrutosTotales);
        
        const code = "LP-" + Math.floor(Math.random() * 9000 + 1000);
        alert(`¡Puntos Redimidos!\n\nCódigo de Verificación: ${code}\nMuestra esta pantalla en recepción para aplicar tu descuento manual.`);
        
        init();
    }
}

window.onload = init;
</script>

</body>
</html>
