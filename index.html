<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Plus - Loyalty Program</title>
    <style>
        :root {
            --bg-color: #0b0e11;
            --card-bg: #161b22;
            --accent-blue: #00d2ff;
            --text-main: #ffffff;
            --text-dim: #8b949e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .logo span { color: var(--accent-blue); }

        .loyalty-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid #30363d;
            position: relative;
            overflow: hidden;
        }

        .label {
            text-transform: uppercase;
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .points-display {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 5px;
        }

        .points-value {
            font-size: 3.5rem;
            font-weight: 700;
        }

        .points-unit {
            font-size: 1.2rem;
            color: var(--accent-blue);
            font-weight: 600;
        }

        .spend-info {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 25px;
        }

        /* Barra de progreso estilo Neón */
        .progress-wrapper {
            margin-top: 20px;
        }

        .progress-bar-bg {
            background: #21262d;
            height: 8px;
            border-radius: 10px;
            width: 100%;
            margin-bottom: 10px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            height: 100%;
            width: 0%;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            transition: width 1s ease-in-out;
        }

        .motivation-text {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.4;
        }

        .btn-generate {
            background: var(--accent-blue);
            color: #000;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 30px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            display: none; /* Se activa con JS */
        }

        .btn-generate:active { transform: scale(0.98); }

        .decoration {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 4px;
        }

        .dot { width: 8px; height: 8px; border-radius: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">LASER <span>PLUS</span></div>
        <div style="font-size: 0.8rem; opacity: 0.7;">Loyalty Program</div>
    </div>

    <div class="loyalty-card">
        <div id="greeting" class="label" style="color: var(--accent-blue); margin-bottom: 20px;">HOLA...</div>
        
        <div class="label">Mis Puntos</div>
        <div class="points-display">
            <div id="points-val" class="points-value">0</div>
            <div class="points-unit">PTS</div>
        </div>
        <div id="spend-val" class="spend-info">Gasto: $0.00 MXN</div>

        <div class="progress-wrapper">
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div id="motivation" class="motivation-text">Cargando datos de tu última visita...</div>
        </div>

        <button id="btn-redeem" class="btn-generate" onclick="handleRedeem()">GENERAR QR DE CANJE</button>

        <div class="decoration">
            <div class="dot" style="background: #E91E63;"></div>
            <div class="dot" style="background: #FFC107;"></div>
            <div class="dot" style="background: #00D2FF;"></div>
        </div>
    </div>
</div>

<script>
    const MIN_POINTS = 50;
    const PERCENTAGE = 0.05;

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const name = params.get('nombre') || 'CLIENTE';
        const phone = params.get('tel');
        
        document.getElementById('greeting').innerText = `HOLA, ${name.toUpperCase()}`;

        if (phone) {
            // Simulando respuesta de Odoo
            // En producción aquí haces el fetch real
            const mockSpend = 850; // Ejemplo: el cliente gastó $850
            const points = Math.floor(mockSpend * PERCENTAGE);
            
            renderData(points, mockSpend);
        }
    }

    function renderData(pts, spend) {
        document.getElementById('points-val').innerText = pts;
        document.getElementById('spend-val').innerText = `Gasto: $${spend.toLocaleString()} MXN`;
        
        const progress = Math.min((pts / MIN_POINTS) * 100, 100);
        document.getElementById('progress-fill').style.width = progress + '%';

        const motivation = document.getElementById('motivation');
        const btn = document.getElementById('btn-redeem');

        if (pts >= MIN_POINTS) {
            motivation.innerHTML = "<span style='color: #28c840'>✓</span> ¡Tienes un beneficio listo para canjear!";
            btn.style.display = 'block';
        } else {
            motivation.innerText = `Te faltan ${MIN_POINTS - pts} puntos para tu primer premio.`;
        }
    }

    function handleRedeem() {
        alert("Presenta este código en caja para validar tus puntos.\nCódigo: LP-" + Math.floor(Math.random() * 9000 + 1000));
    }

    window.onload = init;
</script>

</body>
</html>
