<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Plus - Programa de Lealtad</title>
    <style>
        :root {
            --bg-color: #050709; /* Negro profundo de fondo */
            --card-bg: linear-gradient(135deg, #12161a 0%, #0a0c0e 100%); /* Degradado premium oscuro */
            --accent-blue: #00d2ff;
            --text-main: #ffffff;
            --text-dim: #8b949e;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .logo { 
            font-weight: 800; 
            font-size: 1.3rem; 
            letter-spacing: 1px; 
        }
        .logo span { 
            color: var(--accent-blue); 
        }
        .loyalty-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 1px solid #1f242c;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 25px;
        }
        .greeting {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .card-type {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-blue);
            font-weight: 700;
        }
        
        /* 🔲 LOS 3 CUADRITOS DE COLORES PREMIUM 🔲 */
        .reward-boxes {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            gap: 12px;
        }
        .box {
            flex: 1;
            height: 75px;
            border-radius: 12px;
            background: #111418;
            border: 2px solid #1f242c;
            transition: all 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.25; /* Apagados por defecto */
        }
        /* Estados activos con sus degradados correspondientes */
        .box.level-1.active {
            opacity: 1;
            background: linear-gradient(135deg, #3b1c57 0%, #1a0b2e 100%);
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }
        .box.level-2.active {
            opacity: 1;
            background: linear-gradient(135deg, #1c3d57 0%, #0b1a2e 100%);
            border-color: #2563eb;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
        }
        .box.level-3.active {
            opacity: 1;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            border-color: #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
        }

        .points-section {
            margin-bottom: 20px;
        }
        .points-display {
            display: flex;
            align-items: baseline;
        }
        .points-value {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1;
            color: var(--text-main);
        }
        .points-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-left: 10px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .progress-container {
            background-color: #161b22;
            height: 10px;
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
            border: 1px solid #21262d;
        }
        .progress-fill {
            background: linear-gradient(90deg, #a855f7, #2563eb, #00d2ff); /* Tu hermosa barra multicolor */
            height: 100%;
            width: 0%;
            border-radius: 5px;
            transition: width 1s ease-in-out;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }
        .spend-value {
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .tickets-count {
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        .motivation {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 20px;
            text-align: center;
            min-height: 20px;
        }
        .btn-redeem {
            display: none; /* Se activa con Javascript al llegar a 50 pts */
            width: 100%;
            background: linear-gradient(90deg, #00d2ff, #0084ff);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,210,255,0.4);
            transition: transform 0.2s;
        }
        .btn-redeem:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">LASER<span>PLUS</span></div>
    </div>

    <div class="loyalty-card">
        <div class="card-header">
            <div id="greeting" class="greeting">CARGANDO...</div>
            <div class="card-type">REWARDS CLUB</div>
        </div>

        <div class="reward-boxes">
            <div id="box-1" class="box level-1"></div>
            <div id="box-2" class="box level-2"></div>
            <div id="box-3" class="box level-3"></div>
        </div>
        
        <div class="points-section">
            <div class="points-display">
                <div id="points-val" class="points-value">0</div>
                <div class="points-label">PUNTOS LASER</div>
            </div>
            <div class="progress-container">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <div class="card-footer">
            <div id="spend-val" class="spend-value">Gasto: $0 MXN</div>
            <div id="tickets-val" class="tickets-count">0 Tickets</div>
        </div>
    </div>

    <div id="motivation" class="motivation">Estableciendo conexión segura...</div>
    
    <button id="btn-redeem" class="btn-redeem" onclick="handleRedeem()">CANJEAR RECOMPENSA</button>
</div>

<script>
// --- CONFIGURACIÓN REGLAS DEL JUEGO ---
const MIN_POINTS = 50;
const PERCENTAGE = 0.05; // 5% de acumulación
const MAX_POINTS = 1000;

let currentIdCliente = null;
let puntosBrutosTotales = 0;

// Link de tu Worker en Cloudflare
const workerUrl = "https://laser-plus-api.burnsvibb-1.workers.dev/";

async function init() {
    const params = new URLSearchParams(window.location.search);
    const name = params.get('nombre') || 'CLIENTE';
    let idCliente = params.get('id');

    document.getElementById('greeting').innerText = `HOLA, ${name.toUpperCase()}`;

    if (idCliente) {
        currentIdCliente = idCliente.replace(/\s+/g, '');

        try {
            const response = await fetch(`${workerUrl}?id=${currentIdCliente}`);
            const data = await response.json();

            if (data.gasto !== undefined) {
                const gastoReal = data.gasto;
                const totalTickets = data.total_tickets || 0;
                
                // 1. Calcular puntos brutos desde el 19 de mayo en Odoo
                puntosBrutosTotales = Math.floor(gastoReal * PERCENTAGE);
                if (puntosBrutosTotales > MAX_POINTS) puntosBrutosTotales = MAX_POINTS;

                // 2. Descontar lo que ya se canjeó en este teléfono
                const puntosCanjeadosAnteriores = parseInt(localStorage.getItem(`canjeados_${currentIdCliente}`) || "0", 10);
                
                let puntosActuales = puntosBrutosTotales - puntosCanjeadosAnteriores;
                if (puntosActuales < 0) puntosActuales = 0;

                actualizarInterfaz(puntosActuales, gastoReal, totalTickets);
            } else {
                document.getElementById('motivation').innerText = "Cliente no localizado.";
            }
        } catch (error) {
            console.error("Error original:", error);
            document.getElementById('motivation').innerText = "Fallo de comunicación con Odoo.";
        }
    } else {
        document.getElementById('motivation').innerText = "Acceso inválido. Solicita tu enlace.";
    }
}

function actualizarInterfaz(pts, spend, tickets) {
    document.getElementById('points-val').innerText = pts.toLocaleString();
    document.getElementById('spend-val').innerText = `Gasto: $${spend.toLocaleString()} MXN`;
    document.getElementById('tickets-val').innerText = `${tickets} Tickets`;
    
    // Calcular porcentaje de barra
    const progress = Math.min((pts / MIN_POINTS) * 100, 100);
    document.getElementById('progress-fill').style.width = progress + '%';
    
    // --- LÓGICA DE ENCENDIDO DE LOS 3 CUADRITOS ---
    const box1 = document.getElementById('box-1');
    const box2 = document.getElementById('box-2');
    const box3 = document.getElementById('box-3');

    // Reseteamos estados
    box1.classList.remove('active');
    box2.classList.remove('active');
    box3.classList.remove('active');

    if (pts >= 15 && pts < 35) {
        box1.classList.add('active'); // Se prende el primero (Morado)
    } else if (pts >= 35 && pts < MIN_POINTS) {
        box1.classList.add('active');
        box2.classList.add('active'); // Se prenden los primeros dos (Morado + Azul)
    } else if (pts >= MIN_POINTS) {
        box1.classList.add('active');
        box2.classList.add('active');
        box3.classList.add('active'); // ¡Full combo! Se prenden los tres (Morado + Azul + Aqua brillante)
    }

    // --- MANEJO DEL BOTÓN Y MOTIVACIÓN ---
    const motivation = document.getElementById('motivation');
    const btn = document.getElementById('btn-redeem');

    if (pts >= MIN_POINTS) {
        motivation.innerHTML = "<span style='color: #00d2ff'>✓</span> ¡Beneficio desbloqueado con éxito!";
        btn.style.display = 'block';
    } else {
        motivation.innerText = `Te faltan ${MIN_POINTS - pts} puntos para reclamar tu premio.`;
        btn.style.display = 'none';
    }
}

function handleRedeem() {
    if (!currentIdCliente) return;

    const confirmar = confirm("¿Estás en el mostrador de Laser Plus?\n\nAl aceptar, el personal aplicará tu descuento manual y tus puntos digitales se reiniciarán.");
    
    if (confirmar) {
        localStorage.setItem(`canjeados_${currentIdCliente}`, puntosBrutosTotales);
        
        const code = "LP-" + Math.floor(Math.random() * 9000 + 1000);
        alert(`¡Canje Confirmado!\n\nCódigo de Validación: ${code}\nMuestra esta alerta en recepción para aplicar tu recompensa.`);
        
        // Recarga limpia de interfaz para pintar en 0 de inmediato
        init();
    }
}

window.onload = init;
</script>

</body>
</html>
